<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菁英班榜上有名</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #07080a;
      color: #e2e8f0;
      line-height: 1.4;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* Header */
    .header { text-align: center; margin-bottom: 20px; padding: 12px 0; }
    .header .subtitle { font-size: 11px; color: #f59e0b; letter-spacing: 4px; font-weight: 700; margin-bottom: 4px; }
    .header h1 { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(251, 191, 36, 0.25); margin-bottom: 4px; }
    .header .meta { font-size: 13px; color: #6b7280; }
    .header .status { display: inline-block; margin-top: 8px; padding: 3px 14px; background: linear-gradient(90deg, #dc2626, #ef4444); color: #fff; font-size: 10px; font-weight: 800; border-radius: 4px; letter-spacing: 1px; }

    /* Top Section: Hero + Cards */
    .top-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

    /* Hero Card */
    .hero {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.08), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24);
      opacity: 0.6;
    }
    .hero-label { font-size: 10px; color: #fbbf24; letter-spacing: 3px; font-weight: 700; margin-bottom: 12px; }
    .hero-king { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 16px; }
    .hero-avatar {
      width: 70px; height: 70px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #0f172a;
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
    }
    .hero-info h3 { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .hero-info .sub { font-size: 12px; color: #9ca3af; }
    .hero-info .sub span { color: #fbbf24; font-weight: 700; }
    .hero-stats { display: flex; gap: 20px; }
    .hero-stat { text-align: center; }
    .hero-stat .num { font-size: 22px; font-weight: 800; color: #fbbf24; }
    .hero-stat .txt { font-size: 10px; color: #6b7280; letter-spacing: 1px; margin-top: 2px; }
    .hero-badge {
      position: absolute; top: 16px; right: 16px;
      padding: 4px 14px; background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.3);
      color: #fbbf24; font-size: 11px; font-weight: 800; border-radius: 20px; letter-spacing: 1px;
    }

    /* Cards Grid */
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8));
      border: 1px solid rgba(51, 65, 85, 0.4);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.3), transparent);
    }
    .card .label { font-size: 10px; color: #6b7280; letter-spacing: 1px; margin-bottom: 6px; }
    .card .value { font-size: 32px; font-weight: 900; color: #fff; }
    .card .value.gold { color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
    .card .sub { font-size: 11px; color: #4b5563; margin-top: 2px; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 700; color: #9ca3af;
      cursor: pointer; transition: all 0.3s; border: none; background: rgba(30, 41, 59, 0.4);
      border-radius: 10px; border: 1px solid rgba(51, 65, 85, 0.3);
    }
    .tab:hover { color: #e5e7eb; background: rgba(30, 41, 59, 0.6); }
    .tab.active { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; border-color: #fbbf24; }

    /* Tab Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Ranking List */
    .rank-section {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
      border: 1px solid rgba(51, 65, 85, 0.3);
      border-radius: 16px;
      padding: 20px;
    }
    .rank-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(51, 65, 85, 0.3);
    }
    .rank-header h2 { font-size: 18px; font-weight: 800; color: #fff; }
    .rank-header .tag {
      padding: 4px 12px; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fbbf24; font-size: 11px; font-weight: 700; border-radius: 6px;
    }

    .rank-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px; margin-bottom: 8px; border-radius: 10px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(51, 65, 85, 0.2);
      transition: all 0.2s;
    }
    .rank-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(251, 191, 36, 0.15); }
    .rank-item.top-1 { background: rgba(251, 191, 36, 0.06); border-color: rgba(251, 191, 36, 0.25); }
    .rank-item.top-2 { background: rgba(226, 232, 240, 0.04); border-color: rgba(226, 232, 240, 0.15); }
    .rank-item.top-3 { background: rgba(249, 115, 22, 0.05); border-color: rgba(249, 115, 22, 0.2); }

    .rank-num {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .rn-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
    .rn-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #0f172a; }
    .rn-3 { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; box-shadow: 0 0 12px rgba(249, 115, 22, 0.25); }
    .rn-other { background: #1e293b; color: #6b7280; border: 1px solid #334155; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-info .name { font-size: 15px; font-weight: 700; color: #f8fafc; }
    .rank-info .sub { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .rank-info .sub span { color: #9ca3af; }

    .rank-bar-wrap { flex: 1; max-width: 180px; height: 6px; background: rgba(51, 65, 85, 0.4); border-radius: 3px; overflow: hidden; }
    .rank-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .rank-bar.gold { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .rank-bar.silver { background: linear-gradient(90deg, #e2e8f0, #94a3b8); }
    .rank-bar.bronze { background: linear-gradient(90deg, #f97316, #ea580c); }
    .rank-bar.normal { background: linear-gradient(90deg, #475569, #64748b); }

    .rank-score { font-size: 20px; font-weight: 800; color: #fbbf24; min-width: 40px; text-align: right; }
    .rank-score .unit { font-size: 11px; color: #6b7280; font-weight: 400; margin-left: 2px; }

    /* Responsive */
    @media (max-width: 900px) {
      .top-section { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 32px; }
    }
    @media (max-width: 500px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .card .value { font-size: 24px; }
      .header h1 { font-size: 26px; }
      .hero-king { flex-direction: column; align-items: center; text-align: center; }
      .hero-stats { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="subtitle">GROUP PK ARENA</div>
      <h1>菁英班榜上有名</h1>
      <div class="meta" id="pageMeta">5月11日-8月1日，菁英班火力全开ing</div>
      <div class="status">LIVE</div>
    </div>

    <!-- Top Section: Hero + Overview -->
    <div class="top-section">
      <!-- Hero -->
      <div class="hero" id="heroSection">
        <div class="hero-badge">🏆 领跑者</div>
        <div class="hero-label">领跑军团</div>
        <div class="hero-king" id="championGroup">
          <div class="hero-avatar">冠</div>
          <div class="hero-info">
            <h3 id="championGroupName">--</h3>
            <div class="sub" id="championGroupSub">--</div>
          </div>
        </div>
        <div style="height:1px;background:rgba(251,191,36,0.15);margin:14px 0;"></div>
        <div class="hero-label">领跑个人</div>
        <div class="hero-king" style="margin-bottom:0;" id="championPerson">
          <div class="hero-avatar" style="background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 0 30px rgba(249,115,22,0.3);">王</div>
          <div class="hero-info">
            <h3 id="championPersonName">--</h3>
            <div class="sub" id="championPersonSub">--</div>
          </div>
        </div>
      </div>

      <!-- Overview Cards -->
      <div class="cards-grid">
        <div class="card">
          <div class="label">出单人数</div>
          <div class="value" id="totalPeople">0</div>
          <div class="sub">lpc伙伴</div>
        </div>
        <div class="card">
          <div class="label">菁英班出单</div>
          <div class="value gold" id="totalOrders">0</div>
          <div class="sub">累计个数</div>
        </div>
        <div class="card">
          <div class="label">作战分校</div>
          <div class="value" id="branchCount">0</div>
          <div class="sub">覆盖区域</div>
        </div>
        <div class="card">
          <div class="label">作战军团</div>
          <div class="value" id="groupCount">0</div>
          <div class="sub">精锐单元</div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('branch')">🏫 分校榜</button>
      <button class="tab" onclick="switchTab('group')">⚔️ 军团榜</button>
      <button class="tab" onclick="switchTab('person')">👑 个人榜</button>
    </div>

    <!-- Branch Tab -->
    <div class="tab-content active" id="branch-tab">
      <div class="rank-section">
        <div class="rank-header">
          <h2>分校排行榜</h2>
          <div class="tag">按菁英班个数</div>
        </div>
        <div id="branchList"></div>
      </div>
    </div>

    <!-- Group Tab -->
    <div class="tab-content" id="group-tab">
      <div class="rank-section">
        <div class="rank-header">
          <h2>军团排行榜</h2>
          <div class="tag">按菁英班个数</div>
        </div>
        <div id="groupList"></div>
      </div>
    </div>

    <!-- Person Tab -->
    <div class="tab-content" id="person-tab">
      <div class="rank-section">
        <div class="rank-header">
          <h2>个人排行榜</h2>
          <div class="tag">按菁英班个数</div>
        </div>
        <div id="personList"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed to load data.json');
        const data = await response.json();
        render(data);
      } catch (e) {
        console.error('Error loading data:', e);
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
    }

    function render(data) {
      const activeBranches = data.branches.filter(b => b.orders > 0);
      const activeGroups = data.groups.filter(g => g.orders > 0);

      // Overview
      document.getElementById('totalPeople').textContent = data.totalPeople;
      document.getElementById('totalOrders').textContent = data.totalOrders;
      document.getElementById('branchCount').textContent = activeBranches.length;
      document.getElementById('groupCount').textContent = activeGroups.length;

      // Champion Groups
      if (data.championGroups && data.championGroups.length > 0) {
        const cg = data.championGroups[0];
        document.getElementById('championGroupName').textContent = cg.name;
        document.getElementById('championGroupSub').innerHTML = `<span>${cg.orders}单</span> · ${cg.branch} · ${cg.people.join('、')}`;
        if (data.championGroups.length > 1) {
          const extra = data.championGroups.slice(1).map(g => g.name).join('、');
          document.getElementById('championGroupSub').innerHTML += ` <span style="color:#f59e0b">(并列: ${extra})</span>`;
        }
      }

      // Champion Person
      if (data.championPerson) {
        const cp = data.championPerson;
        document.getElementById('championPersonName').textContent = cp.name;
        document.getElementById('championPersonSub').innerHTML = `<span>${cp.orders}单</span> · ${cp.group} · ${cp.branch}`;
      }

      // Branch List
      const sortedBranches = [...data.branches].sort((a, b) => b.orders - a.orders);
      const branchMax = Math.max(...sortedBranches.map(b => b.orders));
      const branchList = document.getElementById('branchList');
      sortedBranches.forEach((b, i) => {
        if (b.orders === 0) return;
        const rank = i + 1;
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const rnClass = rank === 1 ? 'rn-1' : rank === 2 ? 'rn-2' : rank === 3 ? 'rn-3' : 'rn-other';
        const barClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'normal';
        const pct = branchMax > 0 ? (b.orders / branchMax * 100) : 0;
        const item = document.createElement('div');
        item.className = `rank-item ${topClass}`;
        item.innerHTML = `
          <div class="rank-num ${rnClass}">${rank}</div>
          <div class="rank-info">
            <div class="name">${b.name}</div>
            <div class="sub">${b.people.join('、')}</div>
          </div>
          <div class="rank-bar-wrap"><div class="rank-bar ${barClass}" style="width:${pct}%"></div></div>
          <div class="rank-score">${b.orders}<span class="unit">单</span></div>
        `;
        branchList.appendChild(item);
      });

      // Group List
      const sortedGroups = [...data.groups].sort((a, b) => b.orders - a.orders);
      const groupMax = Math.max(...sortedGroups.map(g => g.orders));
      const groupList = document.getElementById('groupList');
      sortedGroups.forEach((g, i) => {
        if (g.orders === 0) return;
        const rank = i + 1;
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const rnClass = rank === 1 ? 'rn-1' : rank === 2 ? 'rn-2' : rank === 3 ? 'rn-3' : 'rn-other';
        const barClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'normal';
        const pct = groupMax > 0 ? (g.orders / groupMax * 100) : 0;
        const item = document.createElement('div');
        item.className = `rank-item ${topClass}`;
        item.innerHTML = `
          <div class="rank-num ${rnClass}">${rank}</div>
          <div class="rank-info">
            <div class="name">${g.name}</div>
            <div class="sub">${g.branch}</div>
          </div>
          <div class="rank-bar-wrap"><div class="rank-bar ${barClass}" style="width:${pct}%"></div></div>
          <div class="rank-score">${g.orders}<span class="unit">单</span></div>
        `;
        groupList.appendChild(item);
      });

      // Person List
      const sortedPeople = [...data.people].sort((a, b) => b.orders - a.orders);
      const personMax = Math.max(...sortedPeople.map(p => p.orders));
      const personList = document.getElementById('personList');
      sortedPeople.forEach((p, i) => {
        const rank = i + 1;
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const rnClass = rank === 1 ? 'rn-1' : rank === 2 ? 'rn-2' : rank === 3 ? 'rn-3' : 'rn-other';
        const barClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'normal';
        const pct = personMax > 0 ? (p.orders / personMax * 100) : 0;
        const item = document.createElement('div');
        item.className = `rank-item ${topClass}`;
        item.innerHTML = `
          <div class="rank-num ${rnClass}">${rank}</div>
          <div class="rank-info">
            <div class="name">${p.name}</div>
            <div class="sub">${p.group} · <span>${p.branch}</span></div>
          </div>
          <div class="rank-bar-wrap"><div class="rank-bar ${barClass}" style="width:${pct}%"></div></div>
          <div class="rank-score">${p.orders}<span class="unit">单</span></div>
        `;
        personList.appendChild(item);
      });
    }

    loadData();
  </script>
</body>
</html>
