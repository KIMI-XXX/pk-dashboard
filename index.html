<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菁英班榜上有名</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #111827 50%, #0a0a0a 100%);
      color: #e2e8f0;
      line-height: 1.4;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* Header */
    .header { text-align: center; margin-bottom: 20px; padding: 16px 0; }
    .header .subtitle { font-size: 11px; color: #f59e0b; letter-spacing: 3px; font-weight: 700; margin-bottom: 6px; }
    .header h1 { font-size: 42px; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(251, 191, 36, 0.3); margin-bottom: 6px; }
    .header .meta { font-size: 14px; color: #9ca3af; }
    .header .status { display: inline-block; margin-top: 8px; padding: 3px 12px; background: linear-gradient(90deg, #dc2626, #ef4444); color: #fff; font-size: 11px; font-weight: 700; border-radius: 4px; letter-spacing: 1px; }

    /* Overview Cards - 2x2 grid */
    .overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(251, 191, 36, 0.15);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #fbbf24, transparent);
      opacity: 0.5;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(251, 191, 36, 0.4); box-shadow: 0 8px 32px rgba(251, 191, 36, 0.1); }
    .card .label { font-size: 10px; color: #94a3b8; letter-spacing: 1px; margin-bottom: 4px; }
    .card .value { font-size: 36px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
    .card .sub { font-size: 11px; color: #64748b; margin-top: 2px; }
    .card .highlight { color: #fbbf24; }

    /* Tab Navigation */
    .tabs { display: flex; gap: 0; margin-bottom: 16px; border-radius: 8px; overflow: hidden; background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; }
    .tab {
      flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: #94a3b8;
      cursor: pointer; transition: all 0.3s; border: none; background: none;
      border-right: 1px solid #334155;
    }
    .tab:last-child { border-right: none; }
    .tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.03); }
    .tab.active { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; font-weight: 700; }

    /* Tab Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Ranking List - Compact */
    .rank-list { display: flex; flex-direction: column; gap: 6px; }
    .rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(51, 65, 85, 0.3);
      transition: all 0.2s;
    }
    .rank-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(251, 191, 36, 0.2); }
    .rank-item .rank-num {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; box-shadow: 0 0 12px rgba(251, 191, 36, 0.3); }
    .rank-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #0f172a; }
    .rank-3 { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; box-shadow: 0 0 12px rgba(249, 115, 22, 0.3); }
    .rank-other { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-info .name { font-size: 15px; font-weight: 600; color: #f8fafc; }
    .rank-info .sub { font-size: 11px; color: #64748b; margin-top: 1px; }
    .rank-score { font-size: 20px; font-weight: 800; color: #fbbf24; min-width: 48px; text-align: right; }
    .rank-score .unit { font-size: 11px; color: #94a3b8; font-weight: 400; }

    /* Section Box */
    .section-box {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8));
      border: 1px solid rgba(51, 65, 85, 0.4);
      border-radius: 12px;
      padding: 16px;
    }

    /* Top 3 highlight */
    .rank-item.top-1 { border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.05); }
    .rank-item.top-2 { border-color: rgba(226, 232, 240, 0.2); background: rgba(226, 232, 240, 0.03); }
    .rank-item.top-3 { border-color: rgba(249, 115, 22, 0.3); background: rgba(249, 115, 22, 0.05); }

    /* Responsive */
    @media (max-width: 900px) {
      .overview { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 32px; }
    }
    @media (max-width: 500px) {
      .overview { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .card .value { font-size: 28px; }
      .header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="subtitle">GROUP PK ARENA</div>
      <h1>菁英班榜上有名</h1>
      <div class="meta" id="pageMeta">5月11日-8月1日，菁英班火力全开ing</div>
      <div class="status">LIVE</div>
    </div>

    <!-- Overview Cards -->
    <div class="overview">
      <div class="card">
        <div class="label">出单人数</div>
        <div class="value" id="totalPeople">0</div>
        <div class="sub">参与作战</div>
      </div>
      <div class="card">
        <div class="label">菁英班出单</div>
        <div class="value highlight" id="totalOrders">0</div>
        <div class="sub">累计个数</div>
      </div>
      <div class="card">
        <div class="label">作战分校</div>
        <div class="value" id="branchCount">0</div>
        <div class="sub">覆盖区域</div>
      </div>
      <div class="card">
        <div class="label">作战军团</div>
        <div class="value" id="groupCount">0</div>
        <div class="sub">精锐单元</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('branch')">🏫 分校</button>
      <button class="tab" onclick="switchTab('group')">⚔️ 军团</button>
      <button class="tab" onclick="switchTab('person')">👑 个人</button>
    </div>

    <!-- Branch Tab -->
    <div class="tab-content active" id="branch-tab">
      <div class="section-box">
        <div class="rank-list" id="branchList"></div>
      </div>
    </div>

    <!-- Group Tab -->
    <div class="tab-content" id="group-tab">
      <div class="section-box">
        <div class="rank-list" id="groupList"></div>
      </div>
    </div>

    <!-- Person Tab -->
    <div class="tab-content" id="person-tab">
      <div class="section-box">
        <div class="rank-list" id="personList"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed to load data.json');
        const data = await response.json();
        render(data);
      } catch (e) {
        console.error('Error loading data:', e);
        document.querySelector('.container').insertAdjacentHTML('afterbegin',
          '<div style="text-align:center;padding:20px;color:#ef4444;">⚠️ 加载数据失败，请检查 data.json 文件是否存在</div>'
        );
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
    }

    function render(data) {
      const activeBranches = data.branches.filter(b => b.orders > 0);
      const activeGroups = data.groups.filter(g => g.orders > 0);
      document.getElementById('totalPeople').textContent = data.totalPeople;
      document.getElementById('totalOrders').textContent = data.totalOrders;
      document.getElementById('branchCount').textContent = activeBranches.length;
      document.getElementById('groupCount').textContent = activeGroups.length;

      // Branch List
      const sortedBranches = [...data.branches].sort((a, b) => b.orders - a.orders);
      const branchList = document.getElementById('branchList');
      sortedBranches.forEach((b, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const item = document.createElement('div');
        item.className = `rank-item ${topClass}`;
        item.innerHTML = `
          <div class="rank-num ${rankClass}">${rank}</div>
          <div class="rank-info">
            <div class="name">${b.name}</div>
            <div class="sub">${b.people.join('、')}</div>
          </div>
          <div class="rank-score">${b.orders}<span class="unit">单</span></div>
        `;
        branchList.appendChild(item);
      });

      // Group List
      const sortedGroups = [...data.groups].sort((a, b) => b.orders - a.orders);
      const groupList = document.getElementById('groupList');
      sortedGroups.forEach((g, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const item = document.createElement('div');
        item.className = `rank-item ${topClass}`;
        item.innerHTML = `
          <div class="rank-num ${rankClass}">${rank}</div>
          <div class="rank-info">
            <div class="name">${g.name}</div>
            <div class="sub">${g.branch}</div>
          </div>
          <div class="rank-score">${g.orders}<span class="unit">单</span></div>
        `;
        groupList.appendChild(item);
      });

      // Person List
      const sortedPeople = [...data.people].sort((a, b) => b.orders - a.orders);
      const personList = document.getElementById('personList');
      sortedPeople.forEach((p, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const item = document.createElement('div');
        item.className = `rank-item ${topClass}`;
        item.innerHTML = `
          <div class="rank-num ${rankClass}">${rank}</div>
          <div class="rank-info">
            <div class="name">${p.name}</div>
            <div class="sub">${p.group} · ${p.branch}</div>
          </div>
          <div class="rank-score">${p.orders}<span class="unit">单</span></div>
        `;
        personList.appendChild(item);
      });
    }

    loadData();
  </script>
</body>
</html>
