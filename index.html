<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菁英班榜上有名</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.4;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(6, 182, 212, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.06) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(60px); pointer-events: none; z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(6, 182, 212, 0.2); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 350px; height: 350px; background: rgba(168, 85, 247, 0.18); bottom: -100px; right: -100px; animation-delay: -7s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(236, 72, 153, 0.15); top: 40%; left: 60%; animation-delay: -14s; }
    .orb-4 { width: 250px; height: 250px; background: rgba(251, 191, 36, 0.12); top: 20%; right: 30%; animation-delay: -10s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

    .header { text-align: center; margin-bottom: 24px; padding: 16px 0; position: relative; }
    .header::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, #06b6d4, transparent);
    }
    .header .subtitle { font-size: 11px; color: #06b6d4; letter-spacing: 4px; font-weight: 800; margin-bottom: 6px; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
    .header h1 {
      font-size: 44px; font-weight: 900; color: #fff;
      background: linear-gradient(90deg, #06b6d4, #a855f7, #ec4899, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 6px;
    }
    .header .meta { font-size: 13px; color: #6b7280; }
    .header .status {
      display: inline-block; margin-top: 10px; padding: 4px 16px;
      background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.3);
      color: #06b6d4; font-size: 11px; font-weight: 800; border-radius: 20px;
      letter-spacing: 1px; box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
      50% { box-shadow: 0 0 25px rgba(6, 182, 212, 0.4); }
    }

    .hero-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .hero-card {
      border-radius: 16px; padding: 24px; position: relative; overflow: hidden;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .hero-card:hover { transform: translateY(-3px); }
    .hero-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, currentColor, transparent);
      opacity: 0.6;
    }
    .hero-gold {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.08), rgba(15, 23, 42, 0.6));
      border: 1px solid rgba(251, 191, 36, 0.25); color: #fbbf24;
      box-shadow: 0 8px 32px rgba(251, 191, 36, 0.1);
    }
    .hero-gold:hover { box-shadow: 0 8px 40px rgba(251, 191, 36, 0.2); }
    .hero-cyan {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.08), rgba(15, 23, 42, 0.6));
      border: 1px solid rgba(6, 182, 212, 0.25); color: #06b6d4;
      box-shadow: 0 8px 32px rgba(6, 182, 212, 0.1);
    }
    .hero-cyan:hover { box-shadow: 0 8px 40px rgba(6, 182, 212, 0.2); }
    .hero-purple {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), rgba(15, 23, 42, 0.6));
      border: 1px solid rgba(168, 85, 247, 0.25); color: #a855f7;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.1);
    }
    .hero-purple:hover { box-shadow: 0 8px 40px rgba(168, 85, 247, 0.2); }
    .hero-badge {
      position: absolute; top: 14px; right: 14px;
      padding: 3px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: 1px;
    }
    .hero-gold .hero-badge { background: rgba(251, 191, 36, 0.12); border: 1px solid rgba(251, 191, 36, 0.3); color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
    .hero-cyan .hero-badge { background: rgba(6, 182, 212, 0.12); border: 1px solid rgba(6, 182, 212, 0.3); color: #06b6d4; box-shadow: 0 0 10px rgba(6, 182, 212, 0.2); }
    .hero-purple .hero-badge { background: rgba(168, 85, 247, 0.12); border: 1px solid rgba(168, 85, 247, 0.3); color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }
    .hero-label { font-size: 10px; letter-spacing: 3px; font-weight: 700; margin-bottom: 12px; opacity: 0.7; }
    .hero-body { display: flex; align-items: center; gap: 16px; }
    .hero-avatar {
      width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; position: relative;
    }
    .hero-gold .hero-avatar {
      background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a;
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .hero-cyan .hero-avatar {
      background: linear-gradient(135deg, #06b6d4, #0891b2); color: #0f172a;
      box-shadow: 0 0 30px rgba(6, 182, 212, 0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .hero-purple .hero-avatar {
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .hero-info h3 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 3px; }
    .hero-info h3.multi { font-size: 16px; line-height: 1.3; }
    .hero-info .sub { font-size: 12px; color: #9ca3af; }
    .hero-info .sub span { font-weight: 700; }
    .hero-stats { display: flex; gap: 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
    .hero-stat { text-align: center; }
    .hero-stat .num { font-size: 20px; font-weight: 800; }
    .hero-gold .hero-stat .num { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
    .hero-cyan .hero-stat .num { color: #06b6d4; text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
    .hero-purple .hero-stat .num { color: #a855f7; text-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }
    .hero-stat .txt { font-size: 10px; color: #6b7280; letter-spacing: 1px; margin-top: 2px; }

    .overview { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; }
    .card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
      border: 1px solid rgba(51, 65, 85, 0.3); border-radius: 12px;
      padding: 16px; text-align: center; position: relative; overflow: hidden;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 8px 32px rgba(6, 182, 212, 0.1); }
    .card::before {
      content: ''; position: absolute; top: 0; left: -100%; right: 0; height: 2px; width: 200%;
      background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.5), rgba(168, 85, 247, 0.5), transparent);
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(50%); }
    }
    .card .label { font-size: 10px; color: #6b7280; letter-spacing: 1px; margin-bottom: 6px; }
    .card .value { font-size: 32px; font-weight: 900; color: #fff; }
    .card .sub { font-size: 11px; color: #4b5563; margin-top: 2px; }

    .branch-name { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-bottom: 4px; }
    .branch-num { font-size: 32px; font-weight: 900; color: #06b6d4; text-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
    .branch-sub { font-size: 10px; color: #6b7280; margin-top: 2px; letter-spacing: 1px; }

    .boards-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
    .board {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.3), rgba(15, 23, 42, 0.5));
      border: 1px solid rgba(51, 65, 85, 0.25); border-radius: 16px; padding: 20px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
    }
    .board::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, currentColor, transparent);
      opacity: 0.5;
    }
    .board-gold { color: #fbbf24; }
    .board-cyan { color: #06b6d4; }
    .board-purple { color: #a855f7; }
    .board-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(51, 65, 85, 0.3);
    }
    .board-header h2 { font-size: 16px; font-weight: 800; color: #fff; }
    .board-header .tag {
      padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 700;
    }
    .board-gold .tag { background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .board-cyan .tag { background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2); color: #06b6d4; }
    .board-purple .tag { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); color: #a855f7; }

    .rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; margin-bottom: 6px; border-radius: 10px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(51, 65, 85, 0.15);
      transition: all 0.2s; position: relative;
    }
    .rank-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(6, 182, 212, 0.2);
      box-shadow: 0 4px 20px rgba(6, 182, 212, 0.05);
    }
    .rank-item.top-1 {
      background: rgba(251, 191, 36, 0.06);
      border-color: rgba(251, 191, 36, 0.25);
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
    }
    .rank-item.top-2 {
      background: rgba(226, 232, 240, 0.04);
      border-color: rgba(226, 232, 240, 0.15);
      box-shadow: 0 0 15px rgba(226, 232, 240, 0.05);
    }
    .rank-item.top-3 {
      background: rgba(249, 115, 22, 0.05);
      border-color: rgba(249, 115, 22, 0.2);
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.1);
    }

    .rank-num {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
    }
    .rn-1 {
      background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a;
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
    }
    .rn-2 {
      background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #0f172a;
      box-shadow: 0 0 12px rgba(226, 232, 240, 0.2);
    }
    .rn-3 {
      background: linear-gradient(135deg, #f97316, #ea580c); color: #fff;
      box-shadow: 0 0 12px rgba(249, 115, 22, 0.3);
    }
    .rn-other { background: #1e293b; color: #6b7280; border: 1px solid #334155; font-size: 11px; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-info .name { font-size: 14px; font-weight: 700; color: #f8fafc; }
    .rank-info .sub { font-size: 11px; color: #6b7280; margin-top: 1px; }
    .rank-info .sub span { color: #9ca3af; }

    .rank-bar-wrap { flex: 1; max-width: 80px; height: 5px; background: rgba(51, 65, 85, 0.4); border-radius: 3px; overflow: hidden; }
    .rank-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .rank-bar.gold { background: linear-gradient(90deg, #fbbf24, #f59e0b); box-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }
    .rank-bar.silver { background: linear-gradient(90deg, #e2e8f0, #94a3b8); }
    .rank-bar.bronze { background: linear-gradient(90deg, #f97316, #ea580c); }
    .rank-bar.cyan { background: linear-gradient(90deg, #06b6d4, #0891b2); box-shadow: 0 0 8px rgba(6, 182, 212, 0.3); }
    .rank-bar.purple { background: linear-gradient(90deg, #a855f7, #7c3aed); box-shadow: 0 0 8px rgba(168, 85, 247, 0.3); }
    .rank-bar.normal { background: linear-gradient(90deg, #475569, #64748b); }

    .rank-score { font-size: 18px; font-weight: 800; color: #fbbf24; min-width: 36px; text-align: right; }
    .rank-score .unit { font-size: 10px; color: #6b7280; font-weight: 400; margin-left: 2px; }

    .people-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .person-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(51, 65, 85, 0.2);
      font-size: 12px;
      transition: all 0.2s;
    }
    .person-chip:hover {
      background: rgba(6, 182, 212, 0.05);
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
    }
    .person-chip .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #06b6d4;
      box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
      flex-shrink: 0;
    }
    .person-chip .p-name { font-weight: 600; color: #f8fafc; }
    .person-chip .p-sub { font-size: 10px; color: #6b7280; margin-left: auto; }

    @media (max-width: 1100px) {
      .boards-grid { grid-template-columns: 1fr; }
      .hero-section { grid-template-columns: repeat(2, 1fr); }
      .overview { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .overview { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 500px) {
      .overview { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .card .value { font-size: 24px; }
      .header h1 { font-size: 28px; }
      .hero-body { flex-direction: column; text-align: center; }
      .hero-stats { justify-content: center; }
      .people-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <div class="container">
    <div class="header">
      <div class="subtitle">GROUP PK ARENA</div>
      <h1>菁英班榜上有名</h1>
      <div class="meta" id="pageMeta">5月11日-8月1日，菁英班火力全开ing</div>
      <div class="status">LIVE</div>
    </div>

    <div class="hero-section">
      <div class="hero-card hero-gold">
        <div class="hero-badge">🏆 领跑军团</div>
        <div class="hero-label">CHAMPION GROUP</div>
        <div class="hero-body">
          <div class="hero-avatar">冠</div>
          <div class="hero-info">
            <h3 id="championGroupName">--</h3>
            <div class="sub" id="championGroupSub">--</div>
          </div>
        </div>
        <div class="hero-stats" id="championGroupStats">
          <div class="hero-stat"><div class="num" id="cgOrders">0</div><div class="txt">出单</div></div>
          <div class="hero-stat"><div class="num" id="cgPeople">0</div><div class="txt">成员</div></div>
        </div>
      </div>

      <div class="hero-card hero-cyan">
        <div class="hero-badge">✓ 出单勇士</div>
        <div class="hero-label">HEROES ON BOARD</div>
        <div class="hero-body">
          <div class="hero-avatar" style="font-size:20px;" id="heroPeople">--人</div>
          <div class="hero-info">
            <h3>出单勇士</h3>
            <div class="sub" id="heroSubDesc">--位lpc伙伴已破零，每人 <span>1单</span></div>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat"><div class="num" style="color:#06b6d4;" id="heroTotalPeople">0</div><div class="txt">总人数</div></div>
          <div class="hero-stat"><div class="num" style="color:#06b6d4;" id="heroTotalOrders">0</div><div class="txt">总单数</div></div>
          <div class="hero-stat"><div class="num" style="color:#06b6d4;" id="heroBranchCount">0</div><div class="txt">分校</div></div>
        </div>
      </div>

      <div class="hero-card hero-purple">
        <div class="hero-badge">👑 菁英班之星</div>
        <div class="hero-label">CHAMPION STAR</div>
        <div class="hero-body">
          <div class="hero-avatar" style="font-size:18px;">1st</div>
          <div class="hero-info">
            <h3 id="championPersonName">--</h3>
            <div class="sub" id="championPersonSub">--</div>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat"><div class="num" style="color:#a855f7;" id="cpOrders">0</div><div class="txt">出单</div></div>
          <div class="hero-stat"><div class="num" style="color:#a855f7;" id="cpRank">#1</div><div class="txt">排名</div></div>
        </div>
      </div>
    </div>

    <div class="overview" id="branchCards"></div>

    <div class="boards-grid">
      <div class="board board-gold">
        <div class="board-header"><h2>⚔️ 军团排行榜</h2><div class="tag">按菁英班个数</div></div>
        <div id="groupList"></div>
      </div>

      <div class="board board-purple">
        <div class="board-header"><h2>👑 菁英勇士</h2><div class="tag">已出单勇士</div></div>
        <div id="personList"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed');
        render(await response.json());
      } catch (e) { console.error(e); }
    }

    function render(data) {
      // 更新出单勇士卡片
      document.getElementById('heroPeople').textContent = data.totalPeople + '人';
      document.getElementById('heroSubDesc').innerHTML = data.totalPeople + '位lpc伙伴已破零，每人 <span>1单</span>';
      document.getElementById('heroTotalPeople').textContent = data.totalPeople;
      document.getElementById('heroTotalOrders').textContent = data.totalOrders;
      document.getElementById('heroBranchCount').textContent = (data.branches || []).length;

      // 渲染分校卡片
      const branchCards = document.getElementById('branchCards');
      branchCards.innerHTML = '';
      const activeBranches = [...(data.branches || [])].filter(b => b.orders > 0).sort((a, b) => b.orders - a.orders);
      activeBranches.forEach((b, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="branch-name">${b.name}</div>
          <div class="branch-num">${b.orders}</div>
          <div class="branch-sub">${b.people}人出单</div>
        `;
        branchCards.appendChild(card);
      });

      // 冠军军团 - 从 teams 取第一
      const activeTeams = [...(data.teams || [])].filter(t => t.orders > 0).sort((a, b) => b.orders - a.orders);
      if (activeTeams.length > 0) {
        const cg = activeTeams[0];
        // 找出该团队的人
        const teamPeople = (data.people || []).filter(p => p.team === cg.name);
        const peopleNames = teamPeople.map(p => p.name).join('、');
        document.getElementById('championGroupName').textContent = cg.name;
        document.getElementById('championGroupSub').innerHTML = `<span>${cg.name.includes('西安') ? '西安一部' : cg.name.includes('郑州') ? '郑州二部' : cg.name.includes('重庆') ? (cg.name.includes('二部') ? '重庆二部' : cg.name.includes('三部') ? '重庆三部' : '重庆一部') : '未知'}</span> · ${peopleNames || cg.name}`;
        document.getElementById('cgOrders').textContent = cg.orders;
        document.getElementById('cgPeople').textContent = cg.people;
      }

      // 冠军之星 - 从 stars 取
      const stars = data.stars || [];
      if (stars.length > 0) {
        const first = stars[0];
        if (stars.length === 1) {
          document.getElementById('championPersonName').textContent = first.name;
          document.getElementById('championPersonName').className = '';
          document.getElementById('championPersonSub').innerHTML = `<span>${first.team}</span> · ${first.orders}单`;
        } else {
          const names = stars.map(s => s.name).join('、');
          document.getElementById('championPersonName').textContent = names;
          document.getElementById('championPersonName').className = 'multi';
          document.getElementById('championPersonSub').innerHTML = `<span>${first.team}</span> · 并列${first.orders}单`;
        }
        document.getElementById('cpOrders').textContent = first.orders;
        document.getElementById('cpRank').textContent = stars.length > 1 ? '并列#1' : '#1';
      }

      // 军团排行榜
      const gMax = activeTeams.length > 0 ? Math.max(...activeTeams.map(g => g.orders)) : 1;
      const groupList = document.getElementById('groupList');
      groupList.innerHTML = '';
      activeTeams.forEach((g, i) => {
        const rank = i + 1;
        const topClass = rank <= 3 ? `top-${rank}` : '';
        const rnClass = rank === 1 ? 'rn-1' : rank === 2 ? 'rn-2' : rank === 3 ? 'rn-3' : 'rn-other';
        const barClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'normal';
        const pct = gMax > 0 ? (g.orders / gMax * 100) : 0;
        const div = document.createElement('div');
        div.className = `rank-item ${topClass}`;
        div.innerHTML = `
          <div class="rank-num ${rnClass}">${rank}</div>
          <div class="rank-info"><div class="name">${g.name}</div><div class="sub">${g.people}人出单</div></div>
          <div class="rank-bar-wrap"><div class="rank-bar ${barClass}" style="width:${pct}%"></div></div>
          <div class="rank-score">${g.orders}<span class="unit">单</span></div>
        `;
        groupList.appendChild(div);
      });

      // 菁英勇士 - 按分校分组
      const personList = document.getElementById('personList');
      personList.innerHTML = '';
      const byBranch = {};
      (data.people || []).forEach(p => {
        if (!byBranch[p.branch]) byBranch[p.branch] = [];
        byBranch[p.branch].push(p);
      });

      Object.entries(byBranch).forEach(([branch, people]) => {
        const groupDiv = document.createElement('div');
        groupDiv.style.marginBottom = '12px';
        const header = document.createElement('div');
        header.style.cssText = 'font-size:11px;color:#a855f7;font-weight:700;margin-bottom:6px;letter-spacing:1px;text-shadow:0 0 8px rgba(168,85,247,0.3);';
        header.textContent = `${branch} · ${people.length}人`;
        groupDiv.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'people-grid';
        people.forEach(p => {
          const chip = document.createElement('div');
          chip.className = 'person-chip';
          chip.innerHTML = `<div class="dot"></div><span class="p-name">${p.name}</span><span class="p-sub">${p.team ? p.team.split('-')[0] : ''}</span>`;
          grid.appendChild(chip);
        });
        groupDiv.appendChild(grid);
        personList.appendChild(groupDiv);
      });
    }

    loadData();
  </script>
</body>
</html>
