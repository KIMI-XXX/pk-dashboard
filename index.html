<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菁英班榜上有名</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Header */
    .header { text-align: center; margin-bottom: 32px; }
    .header .subtitle { font-size: 12px; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .header h1 { font-size: 36px; font-weight: 800; background: linear-gradient(90deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .header .meta { font-size: 16px; color: #64748b; }
    .header .status { display: inline-block; margin-top: 12px; padding: 4px 16px; background: #dc2626; color: #fff; font-size: 12px; font-weight: 700; border-radius: 4px; letter-spacing: 1px; }

    /* Overview Cards */
    .overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); border-color: #475569; }
    .card .label { font-size: 11px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .card .value { font-size: 32px; font-weight: 800; color: #f8fafc; }
    .card .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .card .highlight { color: #fbbf24; }

    /* Section */
    .section {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #334155;
    }
    .section-header h2 { font-size: 20px; font-weight: 700; }
    .section-header .count { font-size: 12px; color: #94a3b8; }

    /* Rank Table */
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      text-align: left; font-size: 12px; color: #94a3b8; font-weight: 600;
      padding: 10px 12px; border-bottom: 1px solid #334155; text-transform: uppercase; letter-spacing: 1px;
    }
    .rank-table td {
      padding: 12px; border-bottom: 1px solid #1e293b; font-size: 14px;
    }
    .rank-table tr:hover td { background: rgba(255,255,255,0.03); }
    .rank-table .rank-cell {
      width: 40px; text-align: center;
    }
    .rank-num {
      width: 28px; height: 28px; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; }
    .rank-2 { background: linear-gradient(135deg, #cbd5e1, #94a3b8); color: #0f172a; }
    .rank-3 { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; }
    .rank-other { background: #334155; color: #94a3b8; }
    .name-cell { font-weight: 600; color: #f8fafc; }
    .sub-cell { font-size: 12px; color: #64748b; margin-top: 2px; }
    .orders-cell { font-size: 16px; font-weight: 700; color: #fbbf24; text-align: center; }
    .people-cell { font-size: 12px; color: #94a3b8; max-width: 300px; word-break: break-all; }

    /* Two-column layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    /* Responsive */
    @media (max-width: 900px) {
      .overview { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .overview { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="subtitle">GROUP PK ARENA</div>
      <h1>菁英班榜上有名</h1>
      <div class="meta" id="pageMeta">5月11日-8月1日，菁英班火力全开ing</div>
      <div class="status">LIVE</div>
    </div>

    <!-- Overview Cards -->
    <div class="overview">
      <div class="card">
        <div class="label">总出单人数</div>
        <div class="value" id="totalPeople">0</div>
        <div class="sub">参与人员</div>
      </div>
      <div class="card">
        <div class="label">最贵SKU总个数</div>
        <div class="value highlight" id="totalOrders">0</div>
        <div class="sub">累计出单</div>
      </div>
      <div class="card">
        <div class="label">参与分校</div>
        <div class="value" id="branchCount">0</div>
        <div class="sub">覆盖区域</div>
      </div>
      <div class="card">
        <div class="label">参与军团</div>
        <div class="value" id="groupCount">0</div>
        <div class="sub">作战单元</div>
      </div>
    </div>

    <!-- Two Column: Branch + Group -->
    <div class="two-col">
      <!-- Branch Ranking -->
      <div class="section">
        <div class="section-header">
          <h2>🏫 分校排行榜</h2>
          <div class="count">按最贵SKU个数排序</div>
        </div>
        <table class="rank-table">
          <thead>
            <tr><th>排名</th><th>分校</th><th style="text-align:center">SKU个数</th></tr>
          </thead>
          <tbody id="branchTable"></tbody>
        </table>
      </div>

      <!-- Group Ranking -->
      <div class="section">
        <div class="section-header">
          <h2>⚔️ 军团排行榜</h2>
          <div class="count">按最贵SKU个数排序</div>
        </div>
        <table class="rank-table">
          <thead>
            <tr><th>排名</th><th>军团</th><th style="text-align:center">SKU个数</th></tr>
          </thead>
          <tbody id="groupTable"></tbody>
        </table>
      </div>
    </div>

    <!-- People Ranking -->
    <div class="section">
      <div class="section-header">
        <h2>👑 个人排行榜</h2>
        <div class="count">按最贵SKU个数排序</div>
      </div>
      <table class="rank-table">
        <thead>
          <tr><th>排名</th><th>lpc伙伴</th><th>所属军团</th><th style="text-align:center">SKU个数</th></tr>
        </thead>
        <tbody id="peopleTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed to load data.json');
        const data = await response.json();
        render(data);
      } catch (e) {
        console.error('Error loading data:', e);
        document.querySelector('.container').insertAdjacentHTML('afterbegin',
          '<div style="text-align:center;padding:20px;color:#ef4444;">⚠️ 加载数据失败，请检查 data.json 文件是否存在</div>'
        );
      }
    }

    function render(data) {
      // Header
      document.getElementById('pageMeta').textContent = data.subtitle || data.dateRange;

      // Overview
      const activeBranches = data.branches.filter(b => b.orders > 0);
      const activeGroups = data.groups.filter(g => g.orders > 0);
      document.getElementById('totalPeople').textContent = data.totalPeople;
      document.getElementById('totalOrders').textContent = data.totalOrders;
      document.getElementById('branchCount').textContent = activeBranches.length;
      document.getElementById('groupCount').textContent = activeGroups.length;

      // Branch Table (sorted by orders desc)
      const sortedBranches = [...data.branches].sort((a, b) => b.orders - a.orders);
      const branchTbody = document.getElementById('branchTable');
      sortedBranches.forEach((b, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="rank-cell"><span class="rank-num ${rankClass}">${rank}</span></td>
          <td>
            <div class="name-cell">${b.name}</div>
            <div class="sub-cell">${b.people.join('、')}</div>
          </td>
          <td class="orders-cell">${b.orders}</td>
        `;
        branchTbody.appendChild(row);
      });

      // Group Table (sorted by orders desc)
      const sortedGroups = [...data.groups].sort((a, b) => b.orders - a.orders);
      const groupTbody = document.getElementById('groupTable');
      sortedGroups.forEach((g, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="rank-cell"><span class="rank-num ${rankClass}">${rank}</span></td>
          <td>
            <div class="name-cell">${g.name}</div>
            <div class="sub-cell">${g.branch}</div>
          </td>
          <td class="orders-cell">${g.orders}</td>
        `;
        groupTbody.appendChild(row);
      });

      // People Table (sorted by orders desc)
      const sortedPeople = [...data.people].sort((a, b) => b.orders - a.orders);
      const peopleTbody = document.getElementById('peopleTable');
      sortedPeople.forEach((p, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="rank-cell"><span class="rank-num ${rankClass}">${rank}</span></td>
          <td class="name-cell">${p.name}</td>
          <td>
            <div class="name-cell">${p.group}</div>
            <div class="sub-cell">${p.branch}</div>
          </td>
          <td class="orders-cell">${p.orders}</td>
        `;
        peopleTbody.appendChild(row);
      });
    }

    loadData();
  </script>
</body>
</html>
